<!DOCTYPE html>
<html lang="es" class="h-100">
  {% include head.html %}

<body class="d-flex flex-column h-100 highlight-area{% if page.url == '/blog.html' or page.layout == 'post' %} blog-background-gris{% endif %}">

  {% include navigation.html %}

  <!-- El elemento <main> con 'flex-grow-1' empuja al footer hacia abajo -->
  <main class="flex-grow-1">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Scripts al final para optimizar carga -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ '/assets/js/typewriter.js' | relative_url }}"></script>

  <script>
    // Inicialización de Popovers de Bootstrap
    const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]');
    const popoverList = [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl));
  </script>
</body>
</html>
