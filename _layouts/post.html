---
layout: default
---
<h1 class="py-4" style="color: #e5a93c; font-weight: 700;">{{ page.title }}</h1>

<p class="container" style="color: #c9933b; opacity: 0.9;">
  {{ page.date | date_to_string }}
  {% assign author = site.authors | where: 'short_name', page.author | first %}
  {% if author %}
    - <a href="{{ author.url }}" style="color: #e5a93c; text-decoration: underline;">{{ author.name }}</a>
  {% endif %}
</p>

<div class="container rounded-4 p-4 shadow-lg text-start" style="background-color: #1e222b; color: #f5c060; border: 1px solid #3a3f4d;">
  {{ content }}
</div>

<div class="container comments-section mt-5">
  {% include giscus.html %}
</div>
