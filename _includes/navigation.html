<!-- NAVEGACIÓN CON DROPDOWN DINÁMICO -->
<nav class="navbar navbar-expand-lg fixed-top stairway-navbar py-2">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="navbar-brand d-flex align-items-center logo-glow">
      <img src="{{ '/assets/images/logo2.png' | relative_url }}" alt="Stairway Logo" style="height: 100px; width: auto; object-fit: contain;">
      <span class="brand-text ms-2">STAIRWAY</span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        {% for item in site.data.navigation %}
          {% if item.subcategories %}
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle px-3 small fw-bold text-uppercase nav-link-glow"
                 href="#" id="navbarDropdown{{ forloop.index }}" role="button"
                 data-bs-toggle="dropdown" aria-expanded="false">
                {{ item.name }}
              </a>
              <ul class="dropdown-menu shadow-lg border-0 bg-dark" aria-labelledby="navbarDropdown{{ forloop.index }}">
                {% for sub in item.subcategories %}
                <li>
                  <a class="dropdown-item text-white-50 small fw-bold" href="{{ sub.link | relative_url }}">
                    {{ sub.name }}
                  </a>
                </li>
                {% endfor %}
              </ul>
            </li>
          {% else %}
            <li class="nav-item">
              <a href="{{ item.link | relative_url }}"
                 class="nav-link px-3 small fw-bold text-uppercase nav-link-glow {% if page.url == item.link %}active{% endif %}">
                {{ item.name }}
              </a>
            </li>
          {% endif %}
        {% endfor %}
        <!-- BOTÓN TU WEB GRATIS -->
        <li class="nav-item ms-2">
          <a href="https://vendecon.stairway.cl" target="_blank"
             class="btn btn-outline-warning rounded-pill px-4 px-lg-5 py-2 fw-bold shadow-sm">
            <i class="bi bi-shop me-2"></i> Tu web gratis
          </a>
        </li>
        <!-- BOTÓN DE CONTACTO -->
        <li class="nav-item ms-2 ms-lg-3">
          <a href="https://wa.me/56929825990" class="btn btn-gold rounded-pill px-4 px-lg-5 py-2 fw-bold shadow-sm" role="button">
            <i class="bi bi-whatsapp me-2"></i> Contáctanos
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
